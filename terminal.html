<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ascii-visualizer — terminal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center;
           background: #0c0c10; overflow: hidden; }
    #term {
      width: min(94vw, 1200px); height: min(88vh, 760px);
      display: flex; flex-direction: column;
      background: #060608; border-radius: 10px;
      border: 1px solid #26262e;
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
      overflow: hidden;
    }
    #term-bar {
      flex: 0 0 34px; display: flex; align-items: center; gap: 8px;
      padding: 0 14px; background: #17171d; border-bottom: 1px solid #26262e;
      font: 12px Menlo, "SF Mono", monospace; color: #8a8a96;
      user-select: none;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    #term-title { flex: 1; text-align: center; }
    #term-body { flex: 1; position: relative; min-height: 0; }
    #boot {
      position: absolute; inset: 0; padding: 14px 16px; z-index: 2;
      font: 13px/1.55 Menlo, "SF Mono", monospace; color: #b8ffb8;
      white-space: pre-wrap; pointer-events: none;
    }
    #boot .cmd { color: #e8e8ee; }
    #boot .act { pointer-events: auto; cursor: pointer; color: #7df9ff; }
    #boot .act:hover { text-decoration: underline; }
    #tview { position: absolute; inset: 0; width: 100%; height: 100%;
             display: block; opacity: 0; transition: opacity .8s; }
    #term.dragging { outline: 2px dashed #7df9ff; outline-offset: -8px; }
  </style>
</head>
<body>
  <div id="term">
    <div id="term-bar">
      <span class="dot" style="background:#ff5f57"></span>
      <span class="dot" style="background:#febc2e"></span>
      <span class="dot" style="background:#28c840"></span>
      <span id="term-title">jeffrey@lv-426 — node tui/run.mjs — 80×24</span>
    </div>
    <div id="term-body">
      <div id="boot"></div>
      <canvas id="tview"></canvas>
    </div>
  </div>
  <script type="module" src="src/termpage.js"></script>
</body>
</html>
